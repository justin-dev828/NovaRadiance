<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Radiance RP</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">

<style>
:root{
--bg:#0a0f1d;
--card:#111a2e;
--text:#ffffff;
--accent:#38bdf8;
}

.light{
--bg:#f1f5f9;
--card:#ffffff;
--text:#0f172a;
--accent:#2563eb;
}

body{
margin:0;
font-family:Inter;
background:var(--bg);
color:var(--text);
transition:0.3s;
overflow-x:hidden;
}

/* NAV */
header{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
padding:16px 6%;
backdrop-filter:blur(10px);
background:rgba(0,0,0,0.3);
z-index:1000;
}

.logo{font-weight:900;}

nav a{
color:var(--text);
margin-left:15px;
text-decoration:none;
}

/* HERO PARALLAX */
.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
background:url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee") center/cover fixed;
position:relative;
}

.hero::after{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.7);
}

.hero-content{
position:relative;
z-index:2;
animation:fade 1s ease;
}

h1{
font-size:4rem;
text-shadow:0 0 20px var(--accent);
}

.btn{
display:inline-block;
padding:14px 28px;
margin-top:20px;
background:var(--accent);
color:black;
border-radius:10px;
text-decoration:none;
transition:0.3s;
}

.btn:hover{
transform:scale(1.1);
box-shadow:0 0 20px var(--accent);
}

/* CARDS */
section{
padding:80px 6%;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:var(--card);
padding:20px;
border-radius:15px;
transition:0.3s;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 0 25px var(--accent);
}

/* NEWS */
.news-item{
background:var(--card);
padding:20px;
border-radius:15px;
margin-top:10px;
}

/* ADMIN PANEL */
.admin{
background:var(--card);
padding:20px;
border-radius:15px;
margin-top:20px;
}

/* TOGGLE */
.toggle{
position:fixed;
bottom:20px;
right:20px;
padding:10px;
background:var(--accent);
border:none;
border-radius:50px;
cursor:pointer;
}

/* ANIMATION */
@keyframes fade{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<header>
<div class="logo">NOVA RADIANCE RP</div>
<nav>
<a href="#news">News</a>
<a href="#discord">Discord</a>
</nav>
</header>

<!-- HERO -->
<section class="hero">
<div class="hero-content">
<h1>Nova Radiance RP</h1>
<p>Modernes Roleplay mit Live Systemen & Admin Kontrolle</p>
<a class="btn" href="DEIN_DISCORD_LINK">Discord Join</a>
</div>
</section>

<!-- NEWS -->
<section id="news">
<h2>📢 News</h2>
<div id="newsContainer"></div>

<!-- ADMIN PANEL -->
<div class="admin">
<h3>Admin Panel</h3>
<input id="title" placeholder="Titel">
<br><br>
<textarea id="text" placeholder="News Text"></textarea>
<br><br>
<button onclick="addNews()">Posten</button>
</div>
</section>

<!-- DISCORD -->
<section id="discord">
<h2>Discord Live</h2>

<!-- Member Counter -->
<div class="card">
Live Mitglieder: <span id="members">Lade...</span>
</div>

</section>

<button class="toggle" onclick="toggleTheme()">🌙</button>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* 🔥 DEINE FIREBASE CONFIG HIER EINTRAGEN */
const firebaseConfig = {
apiKey: "XXX",
authDomain: "XXX",
projectId: "XXX"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* NEWS LADEN */
async function loadNews(){
const snap = await getDocs(collection(db,"news"));
document.getElementById("newsContainer").innerHTML="";
snap.forEach(doc=>{
let d = doc.data();
document.getElementById("newsContainer").innerHTML += `
<div class="news-item">
<h3>${d.title}</h3>
<p>${d.text}</p>
</div>`;
});
}

/* NEWS HINZUFÜGEN */
window.addNews = async function(){
let t = document.getElementById("title").value;
let tx = document.getElementById("text").value;

await addDoc(collection(db,"news"),{
title:t,
text:tx
});

loadNews();
}

/* DARK MODE */
window.toggleTheme = function(){
document.body.classList.toggle("light");
}

/* START */
loadNews();
</script>

</body>
</html>
